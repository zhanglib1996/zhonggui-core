# zhonggui-core 一键部署
# 使用: docker compose up -d

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhonggui-core-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: zhonggui_core
      POSTGRES_USER: zhonggui
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhonggui -d zhonggui_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Valkey (Redis 兼容)
  valkey:
    image: valkey/valkey:7-alpine
    container_name: zhonggui-core-valkey
    restart: unless-stopped

  # zhonggui-core 服务
  core:
    image: zhonggui-core:latest
    container_name: zhonggui-core-server
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
